<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagamento Seguro - Agência CW</title>
    <script>
        !function(f,b,e,v,n,t,s){/* ... seu código do pixel ... */}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '26659273070332798');
        fbq('track', 'PageView');
    </script>
</head>
<body style="margin:0;padding:0;overflow:hidden;">
    <iframe id="tally-iframe" style="width:100%; height:100vh; border:none;"></iframe>

    <script>
        // Função para ler o cookie do Facebook
        function getCookie(name) {
            let cookie = {};
            document.cookie.split(';').forEach(function(el) {
                let [key,value] = el.split('=');
                cookie[key.trim()] = value;
            })
            return cookie[name];
        }

        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid');
            
            // FBC Blindado: Sempre envia algo para o Make não travar
            const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : 'fb.1.' + Date.now() + '.sem_clique_manual';
            
            // Tenta pegar o FBP (se o Pixel já tiver carregado)
            let fbp = getCookie('_fbp') || '';
            if (!fbp) {
                await new Promise(r => setTimeout(r, 1000)); // Espera 1s se estiver vazio
                fbp = getCookie('_fbp') || '';
            }

            const ua = navigator.userAgent.substring(0, 150);
            let ip = '';
            
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { ip = '0.0.0.0'; } // IP padrão se der erro

            // A MÁGICA: Joga tudo no Iframe do Tally
            const finalURL = `https://tally.so/r/MedLeX?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;
            document.getElementById('tally-iframe').src = finalURL;
        }

        carregarTally();
    </script>
</body>
</html>
