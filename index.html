<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagamento Seguro - Agência CW</title>

    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '26659273070332798');

</head>
<body style="margin:0;padding:0;overflow:hidden;">
    <iframe id="tally-iframe" style="width:100%; height:100vh; border:none;"></iframe>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return "";
        }

        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid') || '';
            
            // FBC Real ou Identificador de Origem
            const fbc = fbclid ? `fb.1.${Date.now()}.${fbclid}` : `fb.1.${Date.now()}.whatsapp_direct`;

            // Captura do FBP Real (Tenta ler 3 vezes com intervalo se estiver vazio)
            let fbp = getCookie('_fbp');
            let tentativas = 0;
            while (!fbp && tentativas < 5) {
                await new Promise(r => setTimeout(r, 800));
                fbp = getCookie('_fbp');
                tentativas++;
            }

            const ua = navigator.userAgent.substring(0, 150);
            let ip = '';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) { ip = ''; }

            const tallyID = "MedLeX";
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;
            
            document.getElementById('tally-iframe').src = finalURL;
        }

        carregarTally();
    </script>
</body>
</html>
