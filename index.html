    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="tally-iframe" src="about:blank" style="width:100%; height:100vh; border:none;"></iframe>

    <script>
        function carregarTally() {
            try {
                var urlParams = new URLSearchParams(window.location.search);
                var valor = urlParams.get('valor') || '';
                var fbclid = urlParams.get('fbclid') || '';
                var fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';

                // Busca o FBP nos cookies
                var fbp = "";
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var c = cookies[i].trim();
                    if (c.indexOf('_fbp=') === 0) {
                        fbp = c.substring(5, c.length);
                        break;
                    }
                }

                var ua = navigator.userAgent.substring(0, 150);
                var tallyID = "MedLeX";
                
                // Monta a URL final (o IP o Tally já captura nativamente no Webhook dele)
                var finalURL = "https://tally.so/r/" + tallyID + "?valor=" + valor + "&fbc=" + fbc + "&fbp=" + fbp + "&ua=" + encodeURIComponent(ua);

                document.getElementById('tally-iframe').src = finalURL;
            } catch (e) {
                // Se der qualquer erro, carrega o básico para não ficar branco
                document.getElementById('tally-iframe').src = "https://tally.so/r/MedLeX";
            }
        }

        // Executa na hora!
        carregarTally();
    </script>
</body>
