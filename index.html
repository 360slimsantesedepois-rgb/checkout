<script>
    function getCookie(name) {
        let cookie = {};
        document.cookie.split(';').forEach(function(el) {
            let [key,value] = el.split('=');
            cookie[key.trim()] = value;
        })
        return cookie[name];
    }

    async function carregarTally() {
        const urlParams = new URLSearchParams(window.location.search);
        const valor = urlParams.get('valor') || '';
        const fbclid = urlParams.get('fbclid');
        
        // --- ESTRATÉGIA PARA WHATSAPP ---
        // Se vier de anúncio, pega o ID real. 
        // Se você mandou no zap, ele cria o rastro "organic_wpp"
        const fbc = fbclid 
            ? 'fb.1.' + Date.now() + '.' + fbclid 
            : 'fb.1.' + Date.now() + '.organic_whatsapp';

        // O FBP é o mais importante aqui: ele pega o rastro se o cliente 
        // já tiver visto qualquer coisa sua no Facebook antes.
        let fbp = getCookie('_fbp') || '';
        if (!fbp) {
            await new Promise(r => setTimeout(r, 1000));
            fbp = getCookie('_fbp') || '';
        }

        const ua = navigator.userAgent.substring(0, 150);
        let ip = '';
        
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            ip = data.ip;
        } catch (e) { 
            ip = '1.1.1.1'; // IP genérico para o Facebook não rejeitar
        }

        const tallyID = "MedLeX";
        // A URL agora vai completa, sem campos vazios
        const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

        document.getElementById('tally-iframe').src = finalURL;
    }

    setTimeout(carregarTally, 1000);
</script>
