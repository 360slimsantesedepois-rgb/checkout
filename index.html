<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro - Agência CW</title>

    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '26659273070332798');
    fbq('track', 'PageView');
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>

    <iframe id="tally-iframe" src="about:blank"></iframe>

    <script>
        // Função para caçar o cookie real do Facebook
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return "";
        }

        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid') || '';
            
            // FBC Real (se vier de anúncio) ou identificador de WhatsApp
            const fbc = fbclid ? `fb.1.${Date.now()}.${fbclid}` : `fb.1.${Date.now()}.whatsapp_direct`;

            // BUSCA PELO FBP REAL: Ele tenta ler o cookie 5 vezes
            let fbp = "";
            for (let i = 0; i < 5; i++) {
                fbp = getCookie('_fbp');
                if (fbp) break; 
                await new Promise(r => setTimeout(r, 600)); // Espera o Pixel "escrever" o cookie
            }

            const ua = navigator.userAgent.substring(0, 150);
            let ip = '';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) { ip = ""; }

            const tallyID = "MedLeX";
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;
            
            // Aqui estava o erro: agora garantimos que o elemento existe antes de preencher
            const iframe = document.getElementById('tally-iframe');
            if (iframe) {
                iframe.src = finalURL;
            }
        }

        // DISPARO SEGURO: Só roda quando o HTML estiver todo na tela
        window.onload = carregarTally;
    </script>
</body>
</html>
