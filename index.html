<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Pagamento Seguro - Agência CW</title>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f9fafb; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="tally-iframe" src="about:blank"></iframe>

    <script>
        // Função ninja para ler cookies
        function getFBP() {
            const name = "_fbp=";
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
            }
            return "";
        }

        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid');
            const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';
            
            // Pega o fbp (Identificador do Navegador)
            let fbp = getFBP();

            const ua = navigator.userAgent.substring(0, 150);
            let ip = '';
            
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { console.log("IP erro"); }

            const tallyID = "MedLeX";
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

            document.getElementById('tally-iframe').src = finalURL;
        }

        // ESPERA 2 SEGUNDOS para o Pixel carregar e o cookie ser criado
        setTimeout(carregarTally, 2000);
    </script>
</body>
</html>
